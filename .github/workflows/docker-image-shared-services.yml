name: Build and push Docker image to AWS ECR on shared-services

on:
  workflow_call:
    inputs:
      # Voeg een optionele input toe om de build te forceren
      trigger_latest:
        type: boolean
        default: false
        required: false
    secrets:
      AWS_REGION_SHARED_SERVICES:
        required: true
      AWS_ACCESS_KEY_ID_SHARED_SERVICES:
        required: true
      AWS_SECRET_ACCESS_KEY_SHARED_SERVICES:
        required: true

jobs:
  build_latest:
    runs-on: ubuntu-latest
    if: |
      inputs.trigger_latest == true || 
      (github.event_name == 'release' && github.event.release.prerelease == false && !contains(github.event.release.tag_name, '-BETA'))
    steps:
      - name: Checkout
        uses: actions/checkout@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.10.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION_SHARED_SERVICES }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_SHARED_SERVICES }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_SHARED_SERVICES }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: 'true'

      - name: Build the Docker image (latest)
        uses: docker/build-push-action@v4.1.1
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}:latest
          cache-to: type=inline
          build-args: |
            CDN_URL=https://cdn.docrevolution.nl/files

  build_dev:
    runs-on: ubuntu-latest
    if: ${{ github.event.release.prerelease == true && contains(github.event.release.tag_name, '-BETA') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.10.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION_SHARED_SERVICES }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_SHARED_SERVICES }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_SHARED_SERVICES }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: 'true'

      - name: Build the Docker image (dev)
        uses: docker/build-push-action@v4.1.1
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}:dev
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}:dev
          cache-to: type=inline
          build-args: |
            CDN_URL=https://uploads.my-test.docrevolution.com/assets

  build_pre_release:
    runs-on: ubuntu-latest
    if: ${{ github.event.release.prerelease == true && contains(github.event.release.tag_name, '-RC') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.10.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION_SHARED_SERVICES }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_SHARED_SERVICES }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_SHARED_SERVICES }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: 'true'

      - name: Build the Docker image (pre-release)
        uses: docker/build-push-action@v4.1.1
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}:pre-release
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}:pre-release
          cache-to: type=inline
          build-args: |
            CDN_URL=https://cdn.docrevolution.nl/files
