name: Build and push Docker image to AWS ECR on shared-services

on:
  workflow_call:
    inputs:
      trigger_latest:
        type: boolean
        default: false
        required: false
      cdn_url:
        type: string
        default: 'https://cdn.docrevolution.nl/files'
        required: false
      cdn_url_dev:
        type: string
        default: 'https://uploads.my-test.docrevolution.com/assets'
        required: false
    secrets:
      AWS_REGION_SHARED_SERVICES:
        required: true
      AWS_ACCESS_KEY_ID_SHARED_SERVICES:
        required: true
      AWS_SECRET_ACCESS_KEY_SHARED_SERVICES:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Tags and Config
        id: prepare
        run: |
          # Default waarden
          SHOULD_RUN=false
          IMAGE_TAG="latest"
          CDN="${{ inputs.cdn_url }}"
          
          if [[ "${{ inputs.trigger_latest }}" == "true" ]]; then
            SHOULD_RUN=true
            IMAGE_TAG="latest"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
          
            if [[ "$IS_PRERELEASE" == "false" && ! "$TAG_NAME" =~ -BETA ]]; then
              SHOULD_RUN=true
              IMAGE_TAG="latest"
            elif [[ "$IS_PRERELEASE" == "true" && "$TAG_NAME" =~ -BETA ]]; then
              SHOULD_RUN=true
              IMAGE_TAG="dev"
              CDN="${{ inputs.cdn_url_dev }}"
            elif [[ "$IS_PRERELEASE" == "true" && "$TAG_NAME" =~ -RC ]]; then
              SHOULD_RUN=true
              IMAGE_TAG="pre-release"
            fi
          fi
          
          echo "should_run=$SHOULD_RUN" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "cdn_url=$CDN" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.prepare.outputs.should_run == 'true'
        uses: actions/checkout@v3.6.0

      - name: Set up Docker Buildx
        if: steps.prepare.outputs.should_run == 'true'
        uses: docker/setup-buildx-action@v2.10.0

      - name: Configure AWS credentials
        if: steps.prepare.outputs.should_run == 'true'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-region: ${{ secrets.AWS_REGION_SHARED_SERVICES }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_SHARED_SERVICES }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_SHARED_SERVICES }}

      - name: Login to Amazon ECR
        if: steps.prepare.outputs.should_run == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: 'true'

      - name: Build and push Docker image
        if: steps.prepare.outputs.should_run == 'true'
        uses: docker/build-push-action@v4.1.1
        with:
          context: .
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}:${{ steps.prepare.outputs.image_tag }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}:${{ steps.prepare.outputs.image_tag }}
          cache-to: type=inline
          build-args: |
            CDN_URL=${{ steps.prepare.outputs.cdn_url }}
            AWS_ACCOUNT="189796657102"
